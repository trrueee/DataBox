<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataBox - AI 问数数据库客户端</title>
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <style>
      /* Boot indicator — visible until React mounts; helps diagnose white-screen */
      #boot-indicator {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: system-ui, sans-serif;
        color: #e0e0e0; background: #020617;
      }
      #boot-indicator h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
      #boot-indicator p  { font-size: 13px; color: #888; max-width: 400px; text-align: center; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-indicator">
      <span style="font-size:40px">🦊</span>
      <h1>DataBox 正在启动…</h1>
      <p id="boot-msg">⏳ 等待引擎…</p>
      <pre id="boot-debug" style="display:block;margin-top:16px;padding:8px 16px;background:#1a1a2e;border-radius:6px;font-size:12px;color:#aaa;max-width:500px;overflow:auto;text-align:left"></pre>
    </div>
    <script>
      // Minimal inline probe — if this fails, the WebView prohibits all JS.
      try {
        document.title = 'OK';
        var d = document.getElementById('boot-debug');
        if (d) d.textContent = '[inline ok] ';
        window.__js_works = true;
      } catch(e) { }
    </script>
    <script>
      var d = document.getElementById('boot-debug');
      if (d) d.textContent = (d.textContent||'') + '[script2 ok] ';
      window.addEventListener('error', function(e) {
        if (d) { d.style.color = '#ff6b6b'; d.textContent += 'ERROR: ' + (e.message || e) + ' '; }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (d) { d.style.color = '#ff6b6b'; d.textContent += 'REJECT: ' + (e.reason?.message || e.reason || '') + ' '; }
      });
      setTimeout(function() {
        if (window.__js_works && d && document.getElementById('boot-indicator')?.style.display !== 'none') {
          d.textContent += '[8s timeout — module did not execute]';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

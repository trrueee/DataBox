name: db.observe
group: db
kind: code
description: >
  Observe the local database map built from synchronized catalog metadata.
  Use this to understand schemas, tables, domains, and table relationships
  before deciding where to inspect or query. This tool does not read live rows.
handler: db_observe
input_schema:
  type: object
  description: Observe the local database map.
  properties:
    mode:
      type: string
      enum: [overview, schema, tables]
      description: overview for a compact map, schema for schema sections, tables for selected table cards.
    table_names:
      type: array
      items:
        type: string
      description: Optional exact table names to include when mode=tables.
policy:
  side_effect: none
  risk_level: safe
binding:
  produces_state_keys: [database_map]
metadata:
  next_route: model

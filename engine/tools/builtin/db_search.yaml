name: db.search
group: db
kind: code
description: >
  Search the local database index for tables and columns by names, comments,
  aliases, and semantic hints. Use this like a coding agent uses grep: search
  first, then inspect the most relevant candidates.
handler: db_search
input_schema:
  type: object
  description: Search tables, columns, comments, aliases, and local catalog hints.
  properties:
    query:
      type: string
      description: Search terms, e.g. "phone user", "GMV order amount", or "手机号 用户".
    limit:
      type: integer
      description: Maximum matches to return.
  required: [query]
policy:
  side_effect: none
  risk_level: safe
metadata:
  next_route: model

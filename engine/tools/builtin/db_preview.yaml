name: db.preview
group: db
kind: code
description: >
  Preview a small, safe sample of live data from one table. Enforces a hard
  LIMIT of 20 rows, column whitelist, TrustGate validation, timeout, result
  truncation, and sensitive value redaction. Supports optional structured WHERE
  and ORDER BY clauses.
handler: db_preview
input_schema:
  type: object
  description: Preview safe sample rows from a table.
  properties:
    table:
      type: string
      description: Exact table name.
    columns:
      type: array
      items:
        type: string
      description: Columns to preview. Defaults to first 8 non-sensitive columns.
    limit:
      type: integer
      description: Requested row count (max 20, default 10).
    where:
      description: >
        Optional filter. Can be a structured dict {"column":"col","op":"=","value":V}
        for simple single-column filters, or a raw WHERE fragment string.
    order_by:
      type: string
      description: Optional ORDER BY fragment, e.g. "created_at DESC".
  required: [table]
policy:
  side_effect: read
  risk_level: warning
metadata:
  next_route: model

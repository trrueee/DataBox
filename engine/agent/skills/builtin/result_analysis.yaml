id: result_analysis
name: Result Analysis
description: >
  Analyze query execution results for patterns, anomalies, and insights. Used
  after data has been queried — synthesizes a structured answer from the result
  set, detects notable facts, identifies anomalies, and suggests follow-up
  questions. Does NOT generate or execute new SQL unless the user explicitly asks.

use_when:
  - user asks "what does this result mean"
  - user asks about patterns or trends in results
  - user asks "are there any anomalies"
  - after successful data_lookup when user wants deeper analysis

allowed_tool_groups:
  - chart

forbidden_tool_groups:
  - sql_generation
  - sql_validation
  - sql_repair
  - execution

steps:
  - stop tool calls when enough evidence is available
  - summarize the grounded conclusion naturally

success_criteria:
  - answer includes row count, column summaries, notable facts, anomalies
  - chart suggestion is provided when visualization would help
  - analysis is grounded in actual query results
  - follow-up questions are evidence-aware

recovery:
  no_execution_data:
    - condition: "no execution result available to analyze"
      action: "explain that data must be queried first, then use db.observe/db.search/sql.validate/sql.execute_readonly before synthesizing an answer"
  empty_result:
    - condition: "result set is empty"
      action: "explain that empty results mean no matching data, check if filters were too restrictive"
  answer_error:
    - condition: "answer synthesis fails"
      action: "report the error and suggest re-running the query"

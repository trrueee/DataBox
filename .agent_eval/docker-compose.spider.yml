# DataBox Spider Eval – MySQL container
# Start:  docker compose -f .agent_eval/docker-compose.spider.yml up -d
# Stop:   docker compose -f .agent_eval/docker-compose.spider.yml down
# (spider_mysql_data volume persists across restarts)

services:
  spider-mysql:
    image: mysql:8.0
    container_name: databox-spider-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bootstrap
    ports:
      - "3307:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --sql_mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION
    volumes:
      - spider_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  spider_mysql_data:
